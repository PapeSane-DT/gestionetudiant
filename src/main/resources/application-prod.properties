# ===== Profil PROD (base de donnees cloud isepat_cloud) =====
# Les valeurs sensibles sont lues depuis des variables d'environnement,
# a definir sur le serveur/plateforme de deploiement (ex: Railway).

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/isepat_cloud?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}
